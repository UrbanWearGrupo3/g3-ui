<div class="min-h-screen flex flex-col bg-black text-gray-100">
  <!-- Navbar Fija -->
  <app-navbar class="fixed top-0 inset-x-0 z-50"></app-navbar>

  <!-- Contenido principal con animación de entrada y padding superior para la navbar -->
  <main class="flex-grow pt-20">
    <div class="page-transition">
      <router-outlet></router-outlet>
    </div>
  </main>


  <app-footer></app-footer>

  <!-- Notification Toast for Unregistered Users -->
  @if (cartService.toastMessage(); as msg) {
  <div class="fixed top-24 left-1/2 -translate-x-1/2 z-50 w-full max-w-md px-4">
    <div class="bg-neutral-900 border border-brand-red text-white p-4 rounded-2xl shadow-2xl flex items-center justify-between gap-4 backdrop-blur-md bg-opacity-95">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-brand-red/10 flex items-center justify-center text-brand-red flex-shrink-0">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
          </svg>
        </div>
        <div class="text-xs font-semibold leading-normal text-gray-200">
          {{ msg }}
        </div>
      </div>
      <div class="flex items-center gap-2 flex-shrink-0">
        <a routerLink="/login" (click)="cartService.toastMessage.set(null)" 
           class="px-3 py-1.5 bg-brand-red hover:bg-white text-black text-[10px] font-black uppercase rounded-lg transition-colors tracking-wider whitespace-nowrap">
          Entrar
        </a>
        <button (click)="cartService.toastMessage.set(null)" 
                class="p-1 hover:bg-white/5 rounded-lg text-gray-400 hover:text-white transition-colors cursor-pointer">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>
  }
</div>
