<div class="min-h-[75vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-brand-card-gray p-8 sm:p-10 rounded-3xl border border-brand-border-gray relative overflow-hidden shadow-2xl">
    <!-- Barra de Acento Rojo -->
    <div class="absolute top-0 inset-x-0 h-1.5 bg-brand-red"></div>

    <div class="text-center">
      <h2 class="text-2xl sm:text-3xl font-black uppercase tracking-tight text-white">Crear Cuenta</h2>
      <p class="mt-2 text-xs text-brand-text-muted">
        ¿Ya tienes una cuenta?
        <a routerLink="/login" class="font-bold text-brand-red hover:underline transition-colors ml-1">
          Inicia sesión
        </a>
      </p>
    </div>

    <!-- Error Alert Box -->
    @if (error()) {
      <div class="p-4 bg-brand-red/10 border border-brand-red/30 rounded-xl text-xs text-brand-red leading-relaxed animate-pulse">
        {{ error() }}
      </div>
    }

    <form class="mt-6 space-y-5" (submit)="onSubmit($event)">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label for="first-name-reg" class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1.5">Nombre</label>
          <input id="first-name-reg" type="text" required [value]="firstName()" (input)="updateField('firstName', $event)"
                 placeholder="Ej: Emilio"
                 class="w-full px-4 py-3 bg-black border border-brand-border-gray rounded-xl text-sm text-white placeholder-gray-650 focus:outline-none focus:border-brand-red transition-all">
        </div>
        <div>
          <label for="last-name-reg" class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1.5">Apellido</label>
          <input id="last-name-reg" type="text" required [value]="lastName()" (input)="updateField('lastName', $event)"
                 placeholder="Ej: García"
                 class="w-full px-4 py-3 bg-black border border-brand-border-gray rounded-xl text-sm text-white placeholder-gray-650 focus:outline-none focus:border-brand-red transition-all">
        </div>
      </div>

      <div>
        <label for="email-reg" class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1.5">Correo Electrónico</label>
        <input id="email-reg" type="email" required autocomplete="email" [value]="email()" (input)="updateField('email', $event)"
               placeholder="nombre@ejemplo.com"
               class="w-full px-4 py-3 bg-black border border-brand-border-gray rounded-xl text-sm text-white placeholder-gray-650 focus:outline-none focus:border-brand-red transition-all">
      </div>

      <div>
        <label for="password-reg" class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1.5">Contraseña</label>
        <input id="password-reg" type="password" required autocomplete="new-password" placeholder="••••••••"
               class="w-full px-4 py-3 bg-black border border-brand-border-gray rounded-xl text-sm text-white placeholder-gray-650 focus:outline-none focus:border-brand-red transition-all">
      </div>

      <div class="flex items-start">
        <input id="terms-reg" type="checkbox" required
               class="h-4 w-4 text-brand-red focus:ring-brand-red border-brand-border-gray bg-black rounded mt-0.5">
        <label for="terms-reg" class="ml-2 block text-xs text-brand-text-muted leading-snug">
          Acepto los <a href="#" class="text-brand-red hover:underline">Términos de Servicio</a> y la <a href="#" class="text-brand-red hover:underline">Política de Privacidad</a> de UrbanWear.
        </label>
      </div>

      <button type="submit"
              class="w-full flex justify-center py-3.5 px-4 bg-brand-red hover:bg-white text-black hover:text-black font-black uppercase text-xs rounded-xl shadow-lg shadow-brand-red/10 transition-all duration-300 tracking-wider cursor-pointer">
        Registrarse y Unirse
      </button>
    </form>
  </div>
</div>
