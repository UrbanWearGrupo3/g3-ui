<div class="min-h-[75vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
  <div
    class="max-w-md w-full space-y-8 bg-brand-card-gray p-8 sm:p-10 rounded-3xl border border-brand-border-gray relative overflow-hidden shadow-2xl">
    <!-- Barra de Acento Rojo -->
    <div class="absolute top-0 inset-x-0 h-1.5 bg-brand-red"></div>

    <div class="text-center">
      <h2 class="text-2xl sm:text-3xl font-black uppercase tracking-tight text-white">Iniciar Sesión</h2>
      <p class="mt-2 text-xs text-brand-text-muted">
        ¿No tienes cuenta?
        <a routerLink="/register" class="font-bold text-brand-red hover:underline transition-colors ml-1">
          Regístrate gratis
        </a>
      </p>
    </div>

    <!-- Error Alert Box -->
    @if (error()) {
    <div
      class="p-4 bg-brand-red/10 border border-brand-red/30 rounded-xl text-xs text-brand-red leading-relaxed animate-pulse">
      {{ error() }}
    </div>
    }

    <form class="mt-6 space-y-6" (submit)="onSubmit($event)">
      <div class="space-y-4">
        <div>
          <label for="email-login" class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1.5">Correo
            Electrónico</label>
          <input id="email-login" type="email" required autocomplete="email" [value]="email()"
            (input)="updateEmail($event)" placeholder="correo@gmail.com"
            class="w-full px-4 py-3 bg-black border border-brand-border-gray rounded-xl text-sm text-white placeholder-gray-650 focus:outline-none focus:border-brand-red transition-all">
        </div>
        <div>
          <div class="flex items-center justify-between mb-1.5">
            <label for="password-login"
              class="block text-xs font-bold text-gray-400 uppercase tracking-wider">Contraseña</label>
            <a href="#" class="text-[10px] font-bold text-brand-red hover:underline uppercase tracking-wider">¿Olvidaste
              tu clave?</a>
          </div>
          <input id="password-login" type="password" required autocomplete="current-password" placeholder="••••••••"
            [value]="password()" (input)="updatePassword($event)"
            class="w-full px-4 py-3 bg-black border border-brand-border-gray rounded-xl text-sm text-white placeholder-gray-650 focus:outline-none focus:border-brand-red transition-all">
        </div>
      </div>

      <div class="flex items-center">
        <input id="remember-login" type="checkbox"
          class="h-4 w-4 text-brand-red focus:ring-brand-red border-brand-border-gray bg-black rounded">
        <label for="remember-login" class="ml-2 block text-xs text-brand-text-muted">
          Recordarme en este dispositivo
        </label>
      </div>

      <button type="submit"
        class="w-full flex justify-center py-3.5 px-4 bg-brand-red hover:bg-white text-black hover:text-black font-black uppercase text-xs rounded-xl shadow-lg shadow-brand-red/10 transition-all duration-300 tracking-wider cursor-pointer">
        Ingresar
      </button>

    </form>
  </div>
</div>
