<div class="min-h-[70vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-slate-50">
  <div class="max-w-md w-full space-y-8 bg-white p-8 sm:p-10 rounded-3xl border border-slate-100 shadow-sm relative overflow-hidden">
    <!-- Accent gradient bar -->
    <div class="absolute top-0 inset-x-0 h-2 bg-gradient-to-r from-indigo-500 to-pink-500"></div>

    <div class="text-center">
      <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Iniciar Sesión</h2>
      <p class="mt-2 text-sm text-slate-500">
        ¿No tienes cuenta?
        <a routerLink="/register" class="font-semibold text-indigo-600 hover:text-indigo-500 transition-colors">
          Regístrate gratis
        </a>
      </p>
    </div>

    <form class="mt-8 space-y-6" action="#" method="POST">
      <div class="rounded-md space-y-4">
        <div>
          <label for="email-address" class="block text-sm font-semibold text-slate-700 mb-1.5">Correo electrónico</label>
          <input id="email-address" name="email" type="email" required autocomplete="email"
                 class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-slate-200 placeholder-slate-450 text-slate-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm transition-all"
                 placeholder="nombre@ejemplo.com">
        </div>
        <div>
          <div class="flex items-center justify-between mb-1.5">
            <label for="password" class="block text-sm font-semibold text-slate-700">Contraseña</label>
            <a href="#" class="text-xs font-semibold text-indigo-600 hover:text-indigo-500 transition-colors">¿Olvidaste tu contraseña?</a>
          </div>
          <input id="password" name="password" type="password" required autocomplete="current-password"
                 class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-slate-200 placeholder-slate-450 text-slate-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm transition-all"
                 placeholder="••••••••">
        </div>
      </div>

      <div class="flex items-center">
        <input id="remember-me" name="remember-me" type="checkbox"
               class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-slate-350 rounded">
        <label for="remember-me" class="ml-2 block text-sm text-slate-600">
          Recordarme en este dispositivo
        </label>
      </div>

      <div>
        <button type="submit"
                class="group relative w-full flex justify-center py-3.5 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-slate-900 hover:bg-indigo-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors shadow-sm">
          Entrar
        </button>
      </div>
    </form>
  </div>
</div>
